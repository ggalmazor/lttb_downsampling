name: Deploy Javadoc

on:
  workflow_dispatch:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ startsWith(steps.version.outputs.version, '17') && '17' || startsWith(steps.version.outputs.version, '21') && '21' || '25' }}
          distribution: 'oracle'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Javadoc
        run: ./gradlew javadoc

      - name: Check out gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Publish versioned Javadoc
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Copy Javadoc into versioned directory
          rm -rf gh-pages/$VERSION
          cp -r lib/build/docs/javadoc/ gh-pages/$VERSION

          # Update latest/ to point to this version
          rm -rf gh-pages/latest
          cp -r lib/build/docs/javadoc/ gh-pages/latest

          # Regenerate index.html listing all versions
          cd gh-pages
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en"><head><meta charset="UTF-8">'
            echo '<title>lttb_downsampling Javadoc</title>'
            echo '<style>body{font-family:sans-serif;max-width:600px;margin:2rem auto}'
            echo 'a{display:block;margin:.5rem 0;font-size:1.1rem}</style>'
            echo '</head><body>'
            echo '<h1>lttb_downsampling Javadoc</h1>'
            echo '<p><a href="latest/"><strong>latest</strong></a></p>'
            echo '<h2>All versions</h2>'
            for dir in $(ls -d [0-9]*/ 2>/dev/null | sort -Vr); do
              v="${dir%/}"
              echo "<a href=\"$v/\">$v</a>"
            done
            echo '</body></html>'
          } > index.html

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "Deploy Javadoc for v${{ steps.version.outputs.version }}"
          git push
